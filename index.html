<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weather + Winds Aloft</title>
<style>
html,body{margin:0;min-height:100%;background:#07141c}
#loading{font-family:system-ui,sans-serif;color:#f4fbff;padding:24px}
</style>
</head>
<body>
<div id="loading">Loading Weather + Winds Aloft…</div>
<script>
(async()=>{
  try{
    const cleanPreviousState=()=>{
      try{
        const last=JSON.parse(localStorage.getItem("lastLoc")||"null");
        if(last && last.name==="Campbeltown Airport" && last.launchSite==="machx"){
          last.launchSite="";
          localStorage.setItem("lastLoc",JSON.stringify(last));
        }
      }catch{}
      const params=new URLSearchParams(location.search);
      const name=params.get("name")||"";
      if(params.get("launchSite")==="machx" && !/^Mach X(?:,|$)/i.test(name)){
        params.delete("launchSite");
        history.replaceState(null,"",location.pathname+(params.toString()?"?"+params.toString():""));
      }
    };
    cleanPreviousState();

    const response=await fetch("legacy.html",{cache:"no-store"});
    if(!response.ok) throw new Error("Could not load the weather app");
    let html=await response.text();

    html=html.replace(
      /<button([^>]*data-name="Campbeltown Airport"[^>]*)data-launch="machx"([^>]*)>Campbeltown Airport<\/button>/,
      '<button$1$2>Campbeltown Airport</button><button data-name="Mach X" data-admin2="Campbeltown Airport" data-admin1="Scotland" data-country="United Kingdom" data-lat="55.4372" data-lon="-5.6864" data-launch="machx">Mach X</button>'
    );

    html=html.replace("Select Campbeltown Airport.","Select Mach X.");

    const modeCss=`
      <style>
      body.machx-only .overview,
      body.machx-only #current,
      body.machx-only #daily,
      body.machx-only #aloft,
      body.machx-only #rain,
      body.machx-only #hourly{display:none!important}
      body.machx-only #launch{display:block!important}
      </style>
    `;

    const modeScript=`
      <script>
      (()=> {
        const update=()=>{
          const params=new URLSearchParams(location.search);
          const value=document.getElementById("q")?.value||"";
          const mach=params.get("launchSite")==="machx" || /^Mach X(?:,|$)/i.test(value);
          document.body.classList.toggle("machx-only",mach);
        };
        new MutationObserver(update).observe(document.documentElement,{subtree:true,childList:true,attributes:true});
        addEventListener("popstate",update);
        addEventListener("load",update);
        setInterval(update,500);
        update();
      })();
      <\/script>
    `;

    html=html.replace("</head>",modeCss+"</head>");
    html=html.replace("</body>",modeScript+"</body>");
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.getElementById("loading").textContent="Weather app failed to load: "+error.message;
  }
})();
</script>
</body>
</html>
